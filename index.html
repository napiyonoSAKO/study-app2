<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デリシャス・スタディ V10 - デラックス</title>
    <style>
        :root {
            --main-food: #ffb347; --bg-vanilla: #fff9f0; --text-choco: #5d4037;
            --btn-green: #aed581; --btn-red: #ff8a80; --accent-pink: #ffc1e3;
        }
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; margin: 0; background: var(--bg-vanilla); color: var(--text-choco); overflow: hidden; touch-action: pan-y; transition: background 1s; }
        .night-mode { background: #2c3e50 !important; color: #ecf0f1 !important; }

        /* ヘッダー・デザイン */
        .header { background: var(--main-food); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; height: 60px; z-index: 2000; box-shadow: 0 4px 0 #e69526; }
        .header h1 { font-size: 1.1rem; margin: 0; flex-grow: 1; text-align: center; font-weight: 900; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
        .menu-btn, .plus-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; min-width: 40px; }

        /* サイドメニュー */
        .side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding-top: 60px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); border-right: 5px solid var(--main-food); }
        .side-menu.open { left: 0; }
        .menu-item { width: 100%; padding: 18px 20px; border: none; background: none; text-align: left; font-size: 1rem; color: var(--text-choco); border-bottom: 1px solid #eee; }

        .content { margin-top: 60px; height: calc(100vh - 60px); position: relative; }
        section { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 120px; }
        section.active { display: block; }

        /* お部屋 & たまご (表情修正) */
        #room-stage { width: 100%; height: 230px; background: white; border-radius: 25px; position: relative; overflow: hidden; border: 5px solid #f8e1c1; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        #room-char { position: absolute; bottom: 20px; left: 50%; transition: left 3s linear; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateX(-50%); }
        #char-emoji { font-size: 4rem; line-height: 1; display: block; }
        #char-face { font-size: 1rem; font-weight: bold; position: absolute; top: 40%; width: 100%; text-align: center; color: #333; pointer-events: none; }

        /* お鍋演出 */
        #pot-container { position: absolute; bottom: 25px; right: 15%; display: none; text-align: center; z-index: 5; }
        .pot { font-size: 3.5rem; animation: cook 0.6s infinite alternate; filter: drop-shadow(2px 2px 0 #ddd); }
        @keyframes cook { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-5px) rotate(3deg); } }
        #timer-display { background: rgba(0,0,0,0.7); color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.9rem; margin-top: 5px; font-weight: bold; }

        /* スワイプ削除カード */
        .swipe-container { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 18px; background: var(--btn-red); box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .card { background: white; padding: 15px; position: relative; z-index: 2; transition: transform 0.3s; border-radius: 15px; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; z-index: 1; }

        /* スケジュール */
        .timeline-wrapper { position: relative; background: white; min-height: 1440px; border-radius: 15px; }
        .time-row { display: flex; height: 60px; border-bottom: 1px solid #f0f0f0; }
        .time-label { width: 50px; font-size: 0.7rem; color: #bbb; text-align: right; padding-right: 8px; line-height: 20px; }
        .plan-block { position: absolute; left: 55px; right: 10px; border-radius: 10px; padding: 8px; font-size: 0.75rem; font-weight: bold; background: #fff8e1; border-left: 5px solid var(--main-food); box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }

        /* ぷにぷにボタン */
        .btn-orange { background: var(--main-food); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin: 8px 0; box-shadow: 0 4px 0 #e69526; cursor: pointer; }
        .btn-orange:active { transform: translateY(2px); box-shadow: 0 2px 0 #e69526; }
        .btn-green { background: var(--btn-green); color: white; border: none; padding: 8px 15px; border-radius: 20px; box-shadow: 0 3px 0 #8dbb5a; font-weight: bold; }
        .btn-red { background: var(--btn-red); color: white; border: none; padding: 8px 15px; border-radius: 20px; box-shadow: 0 3px 0 #e57373; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 6px 0; border: 2px solid #f0f0f0; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--main-food); }
    </style>
</head>
<body onclick="closeAllSwipes()">

<div class="header">
    <button class="menu-btn" onclick="toggleMenu(event)">☰</button>
    <h1 id="title">お部屋</h1>
    <button class="plus-btn" id="header-plus" onclick="openPlanModal()" style="visibility: hidden;">＋</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu(event)" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:2500;"></div>

<nav class="side-menu" id="side-menu">
    <button class="menu-item" onclick="showPage('room', 'お部屋')">🏠 お部屋</button>
    <button class="menu-item" onclick="showPage('timer', '予定')">⏱ 予定</button>
    <button class="menu-item" onclick="showPage('todo', 'Todo')">📝 Todo</button>
    <button class="menu-item" onclick="showPage('habit', '習慣')">✨ 習慣</button>
    <button class="menu-item" onclick="showPage('reading', '読書')">📖 読書</button>
</nav>

<div class="content">
    <section id="room" class="active">
        <div id="room-stage">
            <div id="talk-bubble" class="bubble" style="position: absolute; background: white; border: 2px solid var(--main-food); border-radius: 15px; padding: 8px 12px; font-size: 0.7rem; bottom: 110px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.5s; z-index: 20;">...</div>
            <div id="pot-container">
                <div class="pot">🍲</div>
                <div id="timer-display">00:00</div>
            </div>
            <div id="room-char" onclick="petChar()">
                <span id="char-emoji">🥚</span>
                <span class="char-face" id="char-face">^ ^</span>
            </div>
        </div>
        <div class="card" style="margin-top:15px;">
            <input type="text" id="meigen-input" placeholder="心に残る名言をトッピング">
            <button class="btn-orange" onclick="addMeigen()">名言を保存</button>
            <div id="meigen-list" style="font-size:0.75rem; max-height:80px; overflow-y:auto; margin-top:8px;"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-orange" onclick="exportData()" style="background:#b39ddb; box-shadow:0 4px 0 #9575cd; flex:1;">データ出す</button>
            <button class="btn-orange" onclick="importData()" style="background:#81c784; box-shadow:0 4px 0 #66bb6a; flex:1;">データ取り込む</button>
        </div>
    </section>

    <section id="timer">
        <button class="btn-red" onclick="clearAllPlans()" style="width:100%; margin-bottom:12px;">予定をすべて空にする 🗑</button>
        <div class="timeline-wrapper" id="timeline-wrapper">
            <div id="current-bar" style="position:absolute; left:50px; right:0; height:3px; background:var(--btn-red); z-index:10; border-radius:2px;"></div>
            <div id="plan-container"></div>
        </div>
    </section>

    <section id="todo">
        <div class="card" style="border: 2px solid #ffe0b2;">
            <input type="text" id="todo-input" placeholder="何を作る？(タスク名)">
            <div style="display:flex; gap:8px;">
                <select id="todo-tag"><option>動く</option><option>書く</option><option>読む</option><option>写す</option></select>
                <select id="todo-size"><option value="15">15分</option><option value="30">30分</option><option value="60">1時間</option><option value="90">1時間30分</option></select>
            </div>
            <button class="btn-orange" onclick="addTodo()">注文を確定する</button>
        </div>
        <div id="todo-list"></div>
    </section>

    <section id="habit">
        <div style="text-align:center; padding:15px; background:white; border-radius:20px; border:3px solid var(--main-food); margin-bottom:15px; box-shadow: 0 4px 0 #f8e1c1;">
            現在の満腹度: <span id="score-display" style="font-size:1.8rem; font-weight:bold;">0</span> pt
        </div>
        <div class="card">
            <input type="text" id="habit-input" placeholder="毎日続けたいこと">
            <button class="btn-orange" onclick="addNewHabit()">習慣リストに追加</button>
        </div>
        <div id="habit-list"></div>
    </section>

    <section id="reading">
        <div class="card" style="background:linear-gradient(to bottom, #f1f8e9, #ffffff); border: 2px solid #c5e1a5;">
            <strong>📚 読書数: <span id="year-books">0</span>冊</strong>
            <input type="text" id="book-search" placeholder="本を検索..." oninput="renderBooks()">
        </div>
        <div class="card" style="margin-top:10px;">
            <input type="text" id="bk-title" placeholder="本のタイトル">
            <input type="text" id="bk-author" placeholder="作者名">
            <div style="display:flex; gap:5px;">
                <input type="text" id="bk-pub" placeholder="出版社" style="flex:1;">
                <input type="text" id="bk-year" placeholder="出版年" style="flex:1;">
            </div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="bk-current" placeholder="今のページ" style="flex:1;">
                <input type="number" id="bk-total" placeholder="最後のページ" style="flex:1;">
            </div>
            <div style="font-size:0.7rem; margin-top:5px;">読了目標日:</div>
            <input type="date" id="bk-deadline">
            <button class="btn-orange" onclick="addBook()" style="background:#88d8b0; box-shadow: 0 4px 0 #6dbb96;">本棚に追加</button>
        </div>
        <div id="book-list"></div>
    </section>
</div>

<div class="modal" id="plan-modal">
    <div class="modal-content">
        <h3>🍴 新しい予定</h3>
        <input type="text" id="p-name" placeholder="予定の名前">
        <div style="display:flex; align-items:center; gap:5px;">
            <select id="p-hour" style="flex:1;"></select>時
            <select id="p-min" style="flex:1;"></select>分
        </div>
        <select id="p-dur">
            <option value="30">30分</option>
            <option value="60">1時間</option>
            <option value="90">1時間30分</option>
            <option value="120">2時間</option>
        </select>
        <button class="btn-orange" onclick="savePlan()">予定を入れる</button>
        <button class="btn-orange
