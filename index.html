<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デリシャス・スタディ V11 - 究極</title>
    <style>
        :root {
            --main-food: #ffb347; --bg-vanilla: #fff9f0; --text-choco: #5d4037;
            --btn-green: #aed581; --btn-red: #ff8a80; --accent-pink: #ffc1e3;
        }
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; margin: 0; background: var(--bg-vanilla); color: var(--text-choco); overflow: hidden; touch-action: pan-y; transition: background 1s; }
        .night-mode { background: #2c3e50 !important; color: #ecf0f1 !important; }

        /* ヘッダー */
        .header { background: var(--main-food); color: white; display: flex; align-items: center; justify-content: center; position: fixed; top: 0; width: 100%; height: 60px; z-index: 5000; box-shadow: 0 4px 0 #e69526; }
        .header h1 { font-size: 1.1rem; margin: 0; font-weight: 900; }

        /* フッターメニュー（ここを新設して押しやすくしました！） */
        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; z-index: 10000; border-top: 3px solid var(--main-food); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { background: none; border: none; font-size: 0.7rem; color: var(--text-choco); display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item span { font-size: 1.5rem; margin-bottom: 2px; }

        .content { margin-top: 60px; height: calc(100vh - 130px); position: relative; }
        section { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        section.active { display: block; }

        /* たまごさん (表情位置を完全に固定) */
        #room-stage { width: 100%; height: 230px; background: white; border-radius: 25px; position: relative; overflow: hidden; border: 5px solid #f8e1c1; }
        #room-char { position: absolute; bottom: 20px; left: 50%; width: 80px; height: 80px; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        #char-emoji { font-size: 4rem; line-height: 1; position: relative; }
        #char-face { font-size: 1rem; position: absolute; top: 45%; width: 100%; text-align: center; color: #333; pointer-events: none; font-weight: bold; }

        /* お鍋 */
        #pot-container { position: absolute; bottom: 25px; right: 15%; display: none; text-align: center; z-index: 50; }
        .pot { font-size: 3.5rem; animation: cook 0.6s infinite alternate; }
        @keyframes cook { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        /* カード・ボタン */
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 18px; position: relative; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .swipe-container { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 18px; }
        .swipe-card { background: white; padding: 15px; position: relative; z-index: 2; transition: transform 0.3s; border-radius: 15px; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--btn-red); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; z-index: 1; }

        .btn-orange { background: var(--main-food); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin: 8px 0; box-shadow: 0 4px 0 #e69526; }
        .btn-green { background: var(--btn-green); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .btn-red { background: var(--btn-red); color: white; border: none; padding: 10px; border-radius: 15px; font-weight: bold; }

        /* スケジュール */
        .timeline-wrapper { position: relative; background: white; min-height: 1440px; border-radius: 15px; }
        .time-row { display: flex; height: 60px; border-bottom: 1px solid #f0f0f0; }
        .time-label { width: 50px; font-size: 0.7rem; color: #bbb; text-align: right; padding-right: 8px; line-height: 20px; }
        .plan-block { position: absolute; left: 55px; right: 10px; border-radius: 10px; padding: 8px; font-size: 0.75rem; background: #fff8e1; border-left: 5px solid var(--main-food); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 20000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; }
        input, select { width: 100%; padding: 12px; margin: 6px 0; border: 2px solid #f0f0f0; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body onclick="closeAllSwipes()">

<div class="header">
    <h1 id="title">お部屋</h1>
</div>

<div class="content">
    <section id="room" class="active">
        <div id="room-stage">
            <div id="talk-bubble" style="position: absolute; background: white; border: 2px solid var(--main-food); border-radius: 15px; padding: 8px 12px; font-size: 0.7rem; bottom: 110px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.5s; z-index: 200;">...</div>
            <div id="pot-container">
                <div class="pot">🍲</div>
                <div id="timer-display" style="background:rgba(0,0,0,0.7); color:white; border-radius:10px; padding:2px 5px; font-size:0.8rem;">00:00</div>
            </div>
            <div id="room-char" onclick="petChar()">
                <span id="char-emoji">🥚</span>
                <span id="char-face">^ ^</span>
            </div>
        </div>
        <div class="card" style="margin-top:15px;">
            <input type="text" id="meigen-input" placeholder="心に残る名言をトッピング">
            <button class="btn-orange" onclick="addMeigen()">名言を保存</button>
            <div id="meigen-list" style="font-size:0.75rem; max-height:60px; overflow-y:auto;"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="exportData()" style="background:#b39ddb; color:white; border:none; padding:10px; border-radius:10px; flex:1;">データ出す</button>
            <button onclick="importData()" style="background:#81c784; color:white; border:none; padding:10px; border-radius:10px; flex:1;">取り込む</button>
        </div>
    </section>

    <section id="timer">
        <button class="btn-red" onclick="openPlanModal()" style="width:100%; background:var(--main-food); margin-bottom:10px;">＋ 新しい予定を追加</button>
        <button class="btn-red" onclick="clearAllPlans()" style="width:100%; margin-bottom:12px;">予定をすべて空にする 🗑</button>
        <div class="timeline-wrapper">
            <div id="current-bar" style="position:absolute; left:50px; right:0; height:3px; background:var(--btn-red); z-index:10;"></div>
            <div id="plan-container"></div>
        </div>
    </section>

    <section id="todo">
        <div class="card">
            <input type="text" id="todo-input" placeholder="タスク名">
            <select id="todo-size"><option value="15">15分</option><option value="30">30分</option><option value="60">1時間</option><option value="90">1時間30分</option></select>
            <button class="btn-orange" onclick="addTodo()">注文確定</button>
        </div>
        <div id="todo-list"></div>
    </section>

    <section id="habit">
        <div style="text-align:center; padding:15px; background:white; border-radius:20px; border:3px solid var(--main-food); margin-bottom:15px;">
            現在の満腹度: <span id="score-display" style="font-size:1.8rem; font-weight:bold;">0</span> pt
        </div>
        <div class="card"><input type="text" id="habit-input" placeholder="新しい習慣"><button class="btn-orange" onclick="addNewHabit()">追加</button></div>
        <div id="habit-list"></div>
    </section>

    <section id="reading">
        <div class="card">📖 読書数: <span id="year-books">0</span>冊</div>
        <div class="card">
            <input type="text" id="bk-title" placeholder="本題"><input type="text" id="bk-author" placeholder="作者">
            <div style="display:flex; gap:5px;"><input type="number" id="bk-current" placeholder="今" style="flex:1;"><input type="number" id="bk-total" placeholder="最後" style="flex:1;"></div>
            <input type="date" id="bk-deadline">
            <button class="btn-orange" onclick="addBook()">本棚へ</button>
        </div>
        <div id="book-list"></div>
    </section>
</div>

<nav class="footer-nav">
    <button class="nav-item" onclick="showPage('room', 'お部屋')"><span>🏠</span>お部屋</button>
    <button class="nav-item" onclick="showPage('timer', '予定')"><span>⏱</span>予定</button>
    <button class="nav-item" onclick="showPage('todo', 'Todo')"><span>📝</span>Todo</button>
    <button class="nav-item" onclick="showPage('habit', '習慣')"><span>✨</span>習慣</button>
    <button class="nav-item" onclick="showPage('reading', '読書')"><span>📖</span>読書</button>
</nav>

<div class="modal" id="plan-modal">
    <div class="modal-content">
        <h3>新しい予定</h3>
        <input type="text" id="p-name" placeholder="予定名">
        <div style="display:flex; gap:5px;"><select id="p-hour"></select>時<select id="p-min"></select>分</div>
        <select id="p-dur"><option value="30">30分</option><option value="60">1時間</option><option value="90">1時間30分</option></select>
        <button class="btn-orange" onclick="savePlan()">保存</button>
        <button class="btn-orange" onclick="closeModal()" style="background:#ccc;">キャンセル</button>
    </div>
</div>

<script>
    const getDB = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
    const setDB = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    let focusTimer, focusSec = 0, startX = 0;

    window.onload = () => { initTimeline(); initOptions(); renderAll(); checkNightMode(); setInterval(updateTimeBar, 30000); };

    function checkNightMode() {
        const h = new Date().getHours();
        document.body.classList.toggle('night-mode', h >= 19 || h < 6);
    }

    function showPage(p, t) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('title').innerText = t;
        if(p === 'timer') { updateTimeBar(); }
    }

    function setupSwipe(el, type, index) {
        el.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        el.addEventListener('touchmove', (e) => {
            let diff = startX - e.touches[0].clientX;
            if (diff > 50) { closeAllSwipes(); el.style.transform = "translateX(-80px)"; }
            if (diff < -50) { el.style.transform = "translateX(0)"; }
        }, {passive: true});
    }
    function closeAllSwipes() { document.querySelectorAll('.swipe-card').forEach(c => c.style.transform = "translateX(0)"); }

    function confirmDelete(type, index) {
        if(confirm("削除する？")) {
            const keys = { plan:'fixedPlans', todo:'myTodos', habit:'myHabitList', book:'myBooks' };
            let d = getDB(keys[type], []); d.splice(index, 1); setDB(keys[type], d); renderAll();
        }
    }

    function startFocus(index) {
        const todos = getDB('myTodos', []);
        focusSec = todos[index].time * 60;
        showPage('room', 'お部屋');
        document.getElementById('pot-container').style.display = 'block';
        clearInterval(focusTimer);
        focusTimer = setInterval(() => {
            focusSec--;
            const m = Math.floor(focusSec / 60); const s = focusSec % 60;
            document.getElementById('timer-display').innerText = `${m}:${String(s).padStart(2,'0')}`;
            if(focusSec <= 0) {
                clearInterval(focusTimer);
                document.getElementById('pot-container').style.display = 'none';
                alert("🍲 完食！ポイントゲット！");
                updateScore(20); todos.splice(index, 1); setDB('myTodos', todos); renderAll();
            }
        }, 1000);
    }

    function renderAll() {
        renderPlans(); renderTodos(); renderHabits(); renderBooks();
        const s = getDB('myTotalScore', 0);
        document.getElementById('score-display').innerText = s;
        let em = "🥚"; if(s>=1000)em="🎂";else if(s>=500)em="🍖";else if(s>=300)em="🍱";else if(s>=150)em="🍛";else if(s>=50)em="🍳";
        document.getElementById('char-emoji').innerText = em;
    }

    function renderPlans() {
        const p = getDB('fixedPlans', []);
        document.getElementById('plan-container').innerHTML = p.map((x, i) => `
            <div class="swipe-container" style="position:absolute; top:${x.start}px; height:${x.end-x.start}px; left:55px; right:10px;">
                <div class="swipe-delete-btn" onclick="confirmDelete('plan', ${i})">消</div>
                <div class="swipe-card plan-block" style="position:static; height:100%;" ontouchstart="setupSwipe(this, 'plan', ${i})">${x.title}</div>
            </div>`).join('');
    }
    function renderTodos() {
        const t = getDB('myTodos', []);
        document.getElementById('todo-list').innerHTML = t.map((x, i) => `
            <div class="swipe-container">
                <div class="swipe-delete-btn" onclick="confirmDelete('todo', ${i})">削除</div>
                <div class="swipe-card card" ontouchstart="setupSwipe(this, 'todo', ${i})">
                    <strong>${x.title}</strong> <small>(${x.time}分)</small><br>
                    <button class="btn-green" onclick="startFocus(${i})" style="margin-top:8px;">味見する</button>
                </div>
            </div>`).join('');
    }
    function renderHabits() {
        const h = getDB('myHabitList', []);
        document.getElementById('habit-list').innerHTML = h.map((name, i) => `
            <div class="swipe-container">
                <div class="swipe-delete-btn" onclick="confirmDelete('habit', ${i})">削除</div>
                <div class="swipe-card card" style="display:flex; justify-content:space-between; align-items:center;" ontouchstart="setupSwipe(this, 'habit', ${i})">
                    <strong>${name}</strong>
                    <div><button class="btn-green" onclick="updateScore(10)">+10</button><button class="btn-red" onclick="updateScore(-10)">-10</button></div>
                </div>
            </div>`).join('');
    }
    function renderBooks() {
        const b = getDB('myBooks', []); document.getElementById('year-books').innerText = b.length;
        document.getElementById('book-list').innerHTML = b.map((x, i) => `
            <div class="swipe-container">
                <div class="swipe-delete-btn" onclick="confirmDelete('book', ${i})">削除</div>
                <div class="swipe-card card" ontouchstart="setupSwipe(this, 'book', ${i})">
                    <strong>${x.title}</strong><br><small>${x.current}/${x.total}p</small>
                </div>
            </div>`).join('');
    }

    function updateScore(p) { let s = getDB('myTotalScore', 0); s += p; setDB('myTotalScore', Math.max(0, s)); renderAll(); }
    function petChar() { updateScore(1); document.getElementById('char-face').innerText = " * * "; setTimeout(()=>document.getElementById('char-face').innerText="^ ^", 1000); }
    function initTimeline() { const w = document.querySelector('.timeline-wrapper'); for(let i=0; i<24; i++) w.innerHTML += `<div class="time-row"><div class="time-label">${i}:00</div><div style="flex:1; border-left:1px solid #f0f0f0;"></div></div>`; }
    function initOptions() { const h = document.getElementById('p-hour'); const m = document.getElementById('p-min'); for(let i=0; i<24; i++) h.innerHTML += `<option value="${i}">${i}</option>`; for(let i=0; i<60; i+=5) m.innerHTML += `<option value="${i}">${i}</option>`; }
    function updateTimeBar() { document.getElementById('current-bar').style.top = (new Date().getHours()*60 + new Date().getMinutes()) + "px"; }
    function openPlanModal() { document.getElementById('plan-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('plan-modal').style.display = 'none'; }
    function savePlan() {
        const start = parseInt(document.getElementById('p-hour').value)*60 + parseInt(document.getElementById('p-min').value);
        const p = getDB('fixedPlans', []); p.push({ title: document.getElementById('p-name').value, start, end: start+parseInt(document.getElementById('p-dur').value) });
        setDB('fixedPlans', p); closeModal(); renderPlans();
    }
    function clearAllPlans() { if(confirm("全部消す？")) { setDB('fixedPlans', []); renderPlans(); } }
    function exportData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(localStorage)], {type: "application/json"})); a.download = "data.json"; a.click(); }
    function importData() { const i = document.createElement("input"); i.type = "file"; i.onchange = e => { const f = e.target.files[0]; const r = new FileReader(); r.onload = () => { const d = JSON.parse(r.result); for(let k in d) localStorage.setItem(k, d[k]); location.reload(); }; r.readAsText(f); }; i.click(); }
    function addMeigen() { const m = getDB('myMeigens', []); m.push(document.getElementById('meigen-input').value); setDB('myMeigens', m); document.getElementById('meigen-input').value = ''; renderMeigens(); }
    function renderMeigens() { const m = getDB('myMeigens', ["勉強は別腹！"]); document.getElementById('meigen-list').innerHTML = m.map(x => `<div>✨ ${x}</div>`).join(''); }
    function addTodo() { const t = getDB('myTodos', []); t.push({ title: document.getElementById('todo-input').value, time: document.getElementById('todo-size').value }); setDB('myTodos', t); renderTodos(); }
    function addBook() { const b = getDB('myBooks', []); b.push({ title: document.getElementById('bk-title').value, current: parseInt(document.getElementById('bk-current').value), total: parseInt(document.getElementById('bk-total').value) }); setDB('myBooks', b); renderBooks(); }
    function addNewHabit() { const h = getDB('myHabitList', []); h.push(document.getElementById('habit-input').value); setDB('myHabitList', h); renderHabits(); }
</script>
</body>
</html>
