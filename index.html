<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デリシャス・スタディ V7 FINAL</title>
    <style>
        :root {
            --main-food: #ffb347; --bg-vanilla: #fff9f0; --text-choco: #5d4037;
            --btn-green: #8bc34a; --btn-red: #ef5350; --study-orange: #fb8c00;
        }
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; margin: 0; background: var(--bg-vanilla); color: var(--text-choco); overflow: hidden; }
        
        /* ヘッダー */
        .header { background: var(--main-food); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; height: 60px; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.2rem; margin: 0; flex-grow: 1; text-align: center; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .menu-btn, .plus-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; min-width: 40px; }

        /* サイドメニュー */
        .side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: white; z-index: 3000; transition: 0.3s ease-out; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .side-menu.open { left: 0; }
        .menu-item { width: 100%; padding: 18px 20px; border: none; background: none; text-align: left; font-size: 1rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; color: var(--text-choco); }
        .menu-item.active { background: #fff0db; color: var(--main-food); font-weight: bold; border-left: 5px solid var(--main-food); }

        .content { margin-top: 60px; height: calc(100vh - 60px); position: relative; }
        section { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 120px; }
        section.active { display: block; }

        /* お部屋 & キャラクター */
        #room-stage { width: 100%; height: 230px; background: white; border-radius: 20px; position: relative; overflow: hidden; border: 4px solid #f8e1c1; }
        #room-char { font-size: 5rem; position: absolute; bottom: 10px; left: 50%; transition: left 3s linear; cursor: pointer; z-index: 10; }
        .bubble { position: absolute; background: white; border: 2px solid var(--main-food); border-radius: 15px; padding: 8px 12px; font-size: 0.8rem; bottom: 100px; left: 50%; transform: translateX(-50%); white-space: nowrap; opacity: 0; transition: opacity 0.5s; z-index: 20; }

        /* スケジュール帳（復活！） */
        .timeline-wrapper { position: relative; width: 100%; padding-bottom: 1440px; background: white; }
        .time-row { display: flex; border-bottom: 1px solid #eee; height: 60px; }
        .time-label { width: 50px; text-align: right; padding-right: 10px; font-size: 0.7rem; color: #999; line-height: 20px; }
        .plan-block { position: absolute; left: 55px; right: 10px; opacity: 0.8; z-index: 5; padding: 5px; font-size: 0.75rem; border-radius: 8px; color: var(--text-choco); font-weight: bold; border-left: 5px solid rgba(0,0,0,0.1); }

        /* 長押し削除オーバーレイ */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; user-select: none; -webkit-user-select: none; }
        .delete-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(239,83,80,0.9); border-radius:15px; display:none; align-items:center; justify-content:center; color:white; font-weight:bold; z-index:100; cursor:pointer; }

        /* 共通UI */
        .btn-orange { background: var(--main-food); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-green { background: var(--btn-green); color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .btn-red { background: var(--btn-red); color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        
        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div class="header">
    <button class="menu-btn" onclick="toggleMenu(event)">☰</button>
    <h1 id="title">お部屋</h1>
    <button class="plus-btn" id="header-plus" onclick="openPlanModal()" style="visibility: hidden;">＋</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu(event)"></div>

<nav class="side-menu" id="side-menu">
    <button class="menu-item active" onclick="showPage('room', 'お部屋')">🏠 お部屋</button>
    <button class="menu-item" onclick="showPage('timer', '予定')">⏱ 予定</button>
    <button class="menu-item" onclick="showPage('todo', 'Todo')">📝 Todo</button>
    <button class="menu-item" onclick="showPage('habit', '習慣')">✨ 習慣</button>
    <button class="menu-item" onclick="showPage('reading', '読書')">📖 読書</button>
</nav>

<div class="content">
    <section id="room" class="active">
        <div id="room-stage">
            <div id="talk-bubble" class="bubble">...</div>
            <div id="room-char" onclick="petChar()">
                <span id="char-emoji">🥚</span>
            </div>
        </div>
        <div class="card" style="margin-top:15px;">
            <h4>🎁 名言箱（追加・一覧）</h4>
            <input type="text" id="meigen-input" placeholder="新しい名言を入力">
            <button class="btn-orange" onclick="addMeigen()">名言を保存</button>
            <div id="meigen-list" style="margin-top:10px; font-size:0.8rem; max-height:80px; overflow-y:auto;"></div>
        </div>
        <div class="card">
            <h4>🍽 本日の完食ログ</h4>
            <div id="meal-log" style="font-size:0.85rem;"></div>
        </div>
    </section>

    <section id="timer">
        <div class="timeline-wrapper" id="timeline-wrapper">
            <div id="current-bar" style="position:absolute; left:50px; right:0; height:3px; background:red; z-index:10;"></div>
            <div id="plan-container"></div>
        </div>
    </section>

    <section id="todo">
        <div class="card">
            <input type="text" id="todo-input" placeholder="タスク名">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <select id="todo-tag"><option>動く</option><option>書く</option><option>読む</option><option>写す</option></select>
                <select id="todo-size"><option value="15">おつまみ(15分)</option><option value="30">軽食(30分)</option><option value="60">定食(60分)</option></select>
            </div>
            <button class="btn-orange" onclick="addTodo()" style="margin-top:10px;">注文する</button>
        </div>
        <div id="todo-list"></div>
    </section>

    <section id="habit">
        <div style="text-align:center; padding:15px; background:white; border-radius:15px; border:3px solid var(--main-food); margin-bottom:15px;">
            満腹度: <span id="score-display" style="font-size:1.5rem; font-weight:bold;">0 pt</span>
        </div>
        <div class="card">
            <input type="text" id="habit-input" placeholder="新しい習慣">
            <button class="btn-orange" onclick="addNewHabit()" style="margin-top:5px;">習慣を追加</button>
        </div>
        <div id="habit-list"></div>
    </section>

    <section id="reading">
        <div class="card" style="background:#f1f8e9;">
            <strong>📚 読書数: <span id="year-books">0</span>冊</strong>
            <input type="text" id="book-search" placeholder="タイトルで検索..." oninput="renderBooks()">
        </div>
        <div class="card">
            <input type="text" id="bk-title" placeholder="タイトル（必須）">
            <input type="text" id="bk-author" placeholder="作者">
            <input type="text" id="bk-pub" placeholder="出版社">
            <div style="display:flex; gap:5px;">
                <input type="number" id="bk-current-page" placeholder="今のページ" style="flex:1;">
                <input type="number" id="bk-total-page" placeholder="全ページ" style="flex:1;">
            </div>
            <button class="btn-orange" onclick="addBook()" style="background:#88d8b0; margin-top:10px;">本棚へ</button>
        </div>
        <div id="book-list"></div>
    </section>
</div>

<div class="modal" id="plan-modal">
    <div class="modal-content">
        <h3>新しい予定</h3>
        <input type="text" id="p-name" placeholder="予定名">
        <div style="display:flex; align-items:center; gap:5px;">
            <select id="p-hour" style="flex:1;"></select>時
            <select id="p-min" style="flex:1;"></select>分から
        </div>
        <select id="p-dur"><option value="30">30分</option><option value="60">1時間</option><option value="120">2時間</option></select>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-orange" onclick="savePlan()">保存</button>
            <button class="btn-orange" onclick="closeModal()" style="background:#ccc;">閉じる</button>
        </div>
    </div>
</div>

<script>
    const getDB = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
    const setDB = (k, v) => localStorage.setItem(k, JSON.stringify(v));

    let longPressTimer;

    window.onload = () => {
        initTimeOptions();
        initTimeline();
        renderAll();
        startWalking();
        setInterval(autoTalk, 8000);
        setInterval(updateTimeBar, 60000);
    };

    // UI整理：何もないところをタップして閉じる
    function handleGlobalClick(e) {
        if(e.target.className === 'delete-overlay') return;
        document.querySelectorAll('.delete-overlay').forEach(el => el.style.display = 'none');
    }

    function toggleMenu(e) {
        if(e) e.stopPropagation();
        document.getElementById('side-menu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showPage(p, t) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('title').innerText = t;
        document.getElementById('header-plus').style.visibility = (p === 'timer') ? 'visible' : 'hidden';
        toggleMenu();
        if(p === 'timer') { updateTimeBar(); scrollToNow(); }
    }

    // スケジュール帳（復活）
    function initTimeline() {
        const w = document.getElementById('timeline-wrapper');
        for(let i=0; i<24; i++) {
            const row = document.createElement('div'); row.className = 'time-row';
            row.innerHTML = `<div class="time-label">${i}:00</div><div style="flex:1; border-left:3px solid #ffe0b2;"></div>`;
            w.appendChild(row);
        }
    }

    function renderPlans() {
        const p = getDB('fixedPlans', []);
        document.getElementById('plan-container').innerHTML = p.map((x, i) => {
            const el = document.createElement('div'); el.className = 'plan-block';
            el.style.top = x.start + "px"; el.style.height = (x.end - x.start) + "px";
            el.style.background = "#fff3e0"; el.innerHTML = x.title;
            enableLongPress(el, 'plan', i);
            return el.outerHTML;
        }).join('');
    }

    // 名言とお喋り
    function addMeigen() {
        const input = document.getElementById('meigen-input');
        if(!input.value) return;
        const m = getDB('myMeigens', ["勉強は別腹！"]);
        m.push(input.value); setDB('myMeigens', m); input.value = '';
        renderMeigens();
    }

    function renderMeigens() {
        const m = getDB('myMeigens', ["勉強は別腹！"]);
        document.getElementById('meigen-list').innerHTML = m.map(x => `<div>・${x}</div>`).join('');
    }

    function autoTalk() {
        const m = getDB('myMeigens', ["おいしそう！"]);
        const b = document.getElementById('talk-bubble');
        b.innerText = m[Math.floor(Math.random()*m.length)];
        b.style.opacity = 1; setTimeout(() => b.style.opacity = 0, 4000);
    }

    function startWalking() {
        const char = document.getElementById('room-char');
        setInterval(() => { char.style.left = (Math.random()*70 + 5) + "%"; }, 5000);
    }

    // 長押し削除システム（iPhone風）
    function enableLongPress(el, type, index) {
        const del = document.createElement('div');
        del.className = 'delete-overlay'; del.innerText = '削除する';
        el.appendChild(del);

        const start = (e) => {
            longPressTimer = setTimeout(() => {
                del.style.display = 'flex';
                del.onclick = (ev) => { ev.stopPropagation(); deleteItem(type, index); };
            }, 800);
        };
        const end = () => clearTimeout(longPressTimer);
        el.addEventListener('touchstart', start); el.addEventListener('touchend', end);
        el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
    }

    function deleteItem(type, index) {
        const keys = { plan:'fixedPlans', todo:'myTodos', habit:'myHabitList', book:'myBooks' };
        let data = getDB(keys[type], []);
        data.splice(index, 1); setDB(keys[type], data); renderAll();
    }

    // 読書（ページ計算復活）
    function addBook() {
        const title = document.getElementById('bk-title').value; if(!title) return;
        const b = getDB('myBooks', []);
        b.push({ 
            title, author: document.getElementById('bk-author').value,
            current: document.getElementById('bk-current-page').value || 0,
            total: document.getElementById('bk-total-page').value || 0
        });
        setDB('myBooks', b); renderBooks();
    }

    function renderBooks() {
        const query = document.getElementById('book-search').value;
        const books = getDB('myBooks', []);
        const filtered = books.filter(b => b.title.includes(query));
        document.getElementById('year-books').innerText = books.length;
        document.getElementById('book-list').innerHTML = filtered.map((b, i) => {
            const progress = b.total > 0 ? Math.floor((b.current / b.total) * 100) : 0;
            const el = document.createElement('div'); el.className = 'card';
            el.innerHTML = `<strong>${b.title}</strong><br><small>${b.current} / ${b.total} ページ (${progress}%)</small>`;
            enableLongPress(el, 'book', i); return el.outerHTML;
        }).join('');
    }

    // 習慣（マイナス復活）
    function renderHabits() {
        const h = getDB('myHabitList', ["勉強"]);
        document.getElementById('habit-list').innerHTML = h.map((name, i) => {
            const el = document.createElement('div'); el.className = 'card';
            el.style.display = 'flex'; el.style.justifyContent = 'space-between';
            el.innerHTML = `<span>${name}</span><div><button class="btn-green" onclick="updateScore(10)">おかわり</button><button class="btn-red" onclick="updateScore(-10)" style="margin-left:5px;">残す</button></div>`;
            enableLongPress(el, 'habit', i); return el.outerHTML;
        }).join('');
    }

    // その他機能
    function initTimeOptions() {
        const h = document.getElementById('p-hour'); const m = document.getElementById('p-min');
        for(let i=0; i<24; i++) h.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=0; i<60; i+=5) m.innerHTML += `<option value="${i}">${i}</option>`;
    }
    function updateScore(p) { let s = getDB('myTotalScore', 0); s += p; setDB('myTotalScore', Math.max(0, s)); renderAll(); }
    function openPlanModal() { document.getElementById('plan-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('plan-modal').style.display = 'none'; }
    function savePlan() {
        const start = parseInt(document.getElementById('p-hour').value)*60 + parseInt(document.getElementById('p-min').value);
        const plans = getDB('fixedPlans', []);
        plans.push({ title: document.getElementById('p-name').value, start, end: start+parseInt(document.getElementById('p-dur').value) });
        setDB('fixedPlans', plans); closeModal(); renderPlans();
    }
    function updateTimeBar() { 
        const now = new Date(); 
        document.getElementById('current-bar').style.top = (now.getHours()*60 + now.getMinutes()) + "px"; 
    }
    function scrollToNow() { document.getElementById('timer').scrollTop = (new Date().getHours()*60) - 100; }
    
    function addTodo() {
        const todos = getDB('myTodos', []);
        todos.push({ title: document.getElementById('todo-input').value, tag: document.getElementById('todo-tag').value, time: document.getElementById('todo-size').value });
        setDB('myTodos', todos); renderTodos();
    }
    function renderTodos() {
        const t = getDB('myTodos', []);
        document.getElementById('todo-list').innerHTML = t.map((x, i) => {
            const el = document.createElement('div'); el.className = 'card';
            el.innerHTML = `[${x.tag}] <strong>${x.title}</strong> (${x.time}分)`;
            enableLongPress(el, 'todo', i); return el.outerHTML;
        }).join('');
    }
    function renderAll() {
        renderPlans(); renderTodos(); renderHabits(); renderBooks(); renderMeigens();
        document.getElementById('score-display').innerText = getDB('myTotalScore', 0) + " pt";
        const s = getDB('myTotalScore', 0);
        let em = "🥚"; if(s>=1000) em="🎂"; else if(s>=500) em="🍖"; else if(s>=300) em="🍱"; else if(s>=150) em="🍛"; else if(s>=50) em="🍳";
        document.getElementById('char-emoji').innerText = em;
    }
    function petChar() { createSparkles(); }
</script>

</body>
</html>
